<!DOCTYPE html>
<html lang="lo">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Audio Transcriber (Lao/English)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Lao:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Noto Sans Lao', sans-serif;
            background-color: #f3f4f6;
        }
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        
        .loader {
            border: 3px solid #f3f3f3;
            border-radius: 50%;
            border-top: 3px solid #3b82f6;
            width: 24px;
            height: 24px;
            -webkit-animation: spin 1s linear infinite; /* Safari */
            animation: spin 1s linear infinite;
        }
        @-webkit-keyframes spin {
            0% { -webkit-transform: rotate(0deg); }
            100% { -webkit-transform: rotate(360deg); }
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="text-gray-800 antialiased min-h-screen flex flex-col">

    <!-- Navbar -->
    <nav class="bg-white shadow-sm border-b border-gray-200">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16 items-center">
                <div class="flex items-center gap-3">
                    <div class="bg-blue-600 p-2 rounded-lg text-white">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"></path><path d="M19 10v2a7 7 0 0 1-14 0v-2"></path><line x1="12" x2="12" y1="19" y2="22"></line></svg>
                    </div>
                    <div class="flex flex-col">
                        <span class="font-bold text-xl text-gray-900">AI Audio Transcriber</span>
                        <span class="text-xs font-medium text-transparent bg-clip-text bg-gradient-to-r from-blue-600 to-purple-600 tracking-wide">Powered by Google Gemini ✨</span>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="flex-grow max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 w-full">
        
        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            
            <!-- Left Column: Controls -->
            <div class="lg:col-span-5 space-y-6">
                <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                    <h2 class="text-lg font-semibold mb-4 flex items-center gap-2">
                        <svg class="w-5 h-5 text-blue-500" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20h9"></path><path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4Z"></path></svg>
                        ການຕັ້ງຄ່າ (Settings)
                    </h2>
                    
                    <!-- Language Selection -->
                    <div class="mb-5">
                        <label class="block text-sm font-medium text-gray-700 mb-2">ເລືອກພາສາ (Language)</label>
                        <select id="language-select" class="w-full bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 block p-2.5 outline-none transition">
                            <option value="lao">ພາສາລາວ (Lao)</option>
                            <option value="english">ພາສາອັງກິດ (English)</option>
                        </select>
                    </div>

                    <!-- File Upload -->
                    <div class="mb-5">
                        <label class="block text-sm font-medium text-gray-700 mb-2">ໄຟລ໌ສຽງ (Audio File)</label>
                        <div id="dropzone" class="flex items-center justify-center w-full">
                            <label for="audio-upload" class="flex flex-col items-center justify-center w-full h-40 border-2 border-gray-300 border-dashed rounded-xl cursor-pointer bg-gray-50 hover:bg-gray-100 transition">
                                <div class="flex flex-col items-center justify-center pt-5 pb-6 text-center px-4">
                                    <svg class="w-10 h-10 mb-3 text-gray-400" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 20 16">
                                        <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 13h3a3 3 0 0 0 0-6h-.025A5.56 5.56 0 0 0 16 6.5 5.5 5.5 0 0 0 5.207 5.021C5.137 5.017 5.071 5 5 5a4 4 0 0 0 0 8h2.167M10 15V6m0 0L8 8m2-2 2 2"/>
                                    </svg>
                                    <p class="mb-2 text-sm text-gray-600"><span class="font-semibold">ຄລິກເພື່ອອັບໂຫຼດ</span> ຫຼື ລາກໄຟລ໌ມາວາງ</p>
                                    <p class="text-xs text-gray-500">MP3, AAC, WAV, M4A (ສູງສຸດ 200MB ຫຼື ~3 ຊົ່ວໂມງ)</p>
                                </div>
                                <input id="audio-upload" type="file" class="hidden" accept="audio/*" onchange="handleFileSelect(event)" />
                            </label>
                        </div>
                        
                        <!-- File Info Display -->
                        <div id="file-info" class="hidden mt-3 p-3 bg-blue-50 border border-blue-100 rounded-lg flex items-center justify-between">
                            <div class="flex items-center gap-3 overflow-hidden">
                                <svg class="w-6 h-6 text-blue-600 flex-shrink-0" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19V6l12-3v13M9 19c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zm12-3c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zM9 10l12-3"/></svg>
                                <div class="truncate">
                                    <p id="file-name" class="text-sm font-medium text-gray-800 truncate"></p>
                                    <p id="file-size" class="text-xs text-gray-500"></p>
                                </div>
                            </div>
                            <button onclick="removeFile()" class="text-gray-400 hover:text-red-500 p-1">
                                <svg class="w-5 h-5" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
                            </button>
                        </div>
                    </div>

                    <!-- Action Buttons -->
                    <div class="space-y-3 pt-2">
                        <button id="btn-general" onclick="startTranscription('general')" class="w-full flex items-center justify-center gap-2 text-white bg-blue-600 hover:bg-blue-700 focus:ring-4 focus:ring-blue-300 font-medium rounded-lg text-sm px-5 py-3 focus:outline-none transition disabled:opacity-50 disabled:cursor-not-allowed">
                            <svg class="w-5 h-5" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h7"/></svg>
                            ຖອດສຽງ (ທົ່ວໄປ)
                        </button>
                        
                        <button id="btn-nofiller" onclick="startTranscription('nofiller')" class="w-full flex items-center justify-center gap-2 text-blue-700 bg-blue-100 hover:bg-blue-200 focus:ring-4 focus:ring-blue-300 font-medium rounded-lg text-sm px-5 py-3 focus:outline-none transition disabled:opacity-50 disabled:cursor-not-allowed">
                            <svg class="w-5 h-5" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14.121 15.536c-1.171 1.952-3.07 1.952-4.242 0-1.172-1.953-1.172-5.119 0-7.072 1.171-1.952 3.07-1.952 4.242 0M8 10.5h4m-4 3h4m9-1.5a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                            ຖອດສຽງ (ຕັດຄຳໂຕງໂຕ້ຍອອກ)
                        </button>
                    </div>

                </div>
            </div>

            <!-- Right Column: Output -->
            <div class="lg:col-span-7 flex flex-col h-[600px] lg:h-auto">
                <div class="bg-white rounded-2xl shadow-sm border border-gray-100 flex flex-col h-full overflow-hidden">
                    
                    <!-- Output Header -->
                    <div class="border-b border-gray-100 p-4 bg-gray-50 flex justify-between items-center">
                        <h2 class="text-lg font-semibold flex items-center gap-2 text-gray-800">
                            <svg class="w-5 h-5 text-green-500" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
                            ຂໍ້ຄວາມທີ່ຖອດໄດ້ (Transcript)
                        </h2>
                        
                        <button onclick="exportToWord()" class="flex items-center gap-1.5 text-sm font-medium text-white bg-green-600 hover:bg-green-700 px-3 py-1.5 rounded-md transition shadow-sm">
                            <svg class="w-4 h-4" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/></svg>
                            Export .Doc
                        </button>
                    </div>

                    <!-- Output Textarea -->
                    <div class="flex-grow relative">
                        <textarea id="transcript-output" class="w-full h-full p-6 text-gray-700 bg-white border-none resize-none focus:ring-0 outline-none leading-relaxed" placeholder="ຂໍ້ຄວາມທີ່ຖອດໄດ້ຈະສະແດງຢູ່ທີ່ນີ້... ທ່ານສາມາດແກ້ໄຂໄດ້ຫຼັງຈາກຖອດສຽງສຳເລັດ."></textarea>
                        
                        <!-- Loading Overlay -->
                        <div id="loading-overlay" class="absolute inset-0 bg-white/90 backdrop-blur-sm hidden flex-col items-center justify-center z-10">
                            <div class="loader mb-4"></div>
                            <p id="loading-text" class="text-blue-600 font-medium">ກຳລັງອ່ານໄຟລ໌ສຽງ...</p>
                            <p class="text-xs text-gray-500 mt-2 max-w-xs text-center">ໝາຍເຫດ: ໄຟລ໌ຂະໜາດໃຫຍ່ອາດຈະໃຊ້ເວລາປະມວນຜົນຫຼາຍນາທີ, ກະລຸນາລໍຖ້າ.</p>
                        </div>
                    </div>
                </div>
            </div>

        </div>
    </main>

    <!-- Custom Toast Notification -->
    <div id="toast-container" class="fixed bottom-5 right-5 z-50 flex flex-col gap-2"></div>

    <script>
        // API Configuration
        const apiKey = ""; // Gemini API Key is provided by execution environment
        
        // App State
        let currentFile = null;
        let isProcessing = false;
        
        // UI Elements
        const fileInput = document.getElementById('audio-upload');
        const fileInfo = document.getElementById('file-info');
        const fileName = document.getElementById('fileName');
        const fileSize = document.getElementById('fileSize');
        const dropzone = document.getElementById('dropzone');
        const btnGeneral = document.getElementById('btn-general');
        const btnNoFiller = document.getElementById('btn-nofiller');
        const outputArea = document.getElementById('transcript-output');
        const loadingOverlay = document.getElementById('loading-overlay');
        const loadingText = document.getElementById('loading-text');

        // Maximum file size: 200MB in bytes
        const MAX_FILE_SIZE = 200 * 1024 * 1024; 

        // -- Event Listeners for Drag and Drop --
        dropzone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropzone.classList.add('border-blue-500', 'bg-blue-50');
        });
        dropzone.addEventListener('dragleave', () => {
            dropzone.classList.remove('border-blue-500', 'bg-blue-50');
        });
        dropzone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropzone.classList.remove('border-blue-500', 'bg-blue-50');
            if (e.dataTransfer.files && e.dataTransfer.files.length > 0) {
                processSelectedFile(e.dataTransfer.files[0]);
            }
        });

        // -- File Selection Logic --
        function handleFileSelect(event) {
            const file = event.target.files[0];
            if (file) {
                processSelectedFile(file);
            }
        }

        function processSelectedFile(file) {
            // Check if it's an audio file
            if (!file.type.startsWith('audio/')) {
                showToast("ກະລຸນາອັບໂຫຼດໄຟລ໌ສຽງເທົ່ານັ້ນ (MP3, AAC, WAV...)", "error");
                return;
            }

            // Check size (200MB)
            if (file.size > MAX_FILE_SIZE) {
                showToast("ຂະໜາດໄຟລ໌ໃຫຍ່ເກີນໄປ. ຮອງຮັບສູງສຸດ 200MB.", "error");
                return;
            }

            currentFile = file;
            
            // Display file info
            document.getElementById('file-name').textContent = file.name;
            const sizeMB = (file.size / (1024 * 1024)).toFixed(2);
            document.getElementById('file-size').textContent = `${sizeMB} MB`;
            
            fileInfo.classList.remove('hidden');
            
            if (file.size > 20 * 1024 * 1024) {
                showToast("ໄຟລ໌ມີຂະໜາດໃຫຍ່, ອາດຈະໃຊ້ເວລາອ່ານ ແລະ ປະມວນຜົນດົນກວ່າປົກກະຕິ.", "info");
            }
        }

        function removeFile() {
            currentFile = null;
            fileInput.value = "";
            fileInfo.classList.add('hidden');
            outputArea.value = "";
        }

        // -- Read File to Base64 --
        function readFileAsBase64(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = () => {
                    // Extract just the base64 string without the data URL prefix
                    const base64String = reader.result.split(',')[1];
                    resolve(base64String);
                };
                reader.onerror = (error) => {
                    reject(error);
                };
                reader.readAsDataURL(file);
            });
        }

        // -- API Request with Retry Logic --
        async function fetchWithRetry(url, options, maxRetries = 5) {
            let delays = [1000, 2000, 4000, 8000, 16000];
            
            for (let i = 0; i < maxRetries; i++) {
                try {
                    const response = await fetch(url, options);
                    if (response.ok) {
                        return await response.json();
                    }
                    if (response.status === 400 || response.status === 403 || response.status === 404) {
                        // Client errors usually shouldn't be retried
                        const errorData = await response.json();
                        throw new Error(`API Error: ${errorData.error?.message || response.statusText}`);
                    }
                    // If it's a 500+ error, we will retry
                    throw new Error(`Server Error: ${response.status}`);
                } catch (error) {
                    if (i === maxRetries - 1) throw error;
                    // Wait before retrying
                    await new Promise(resolve => setTimeout(resolve, delays[i]));
                }
            }
        }

        // -- Main Transcription Logic --
        async function startTranscription(mode) {
            if (!currentFile) {
                showToast("ກະລຸນາເລືອກໄຟລ໌ສຽງກ່ອນ!", "warning");
                return;
            }
            if (!apiKey) {
                showToast("ບໍ່ພົບ API Key. ກະລຸນາລັນໃນສະພາບແວດລ້ອມທີ່ຖືກຕ້ອງ.", "error");
                return;
            }

            const language = document.getElementById('language-select').value;
            const langText = language === 'lao' ? "Lao" : "English";

            // Prepare Prompts based on Mode
            let systemInstructionText = "You are a professional audio transcriptionist. Your absolute mandate is to transcribe the provided audio accurately. You MUST transcribe EVERY SINGLE WORD from the very beginning to the absolute end of the audio file. DO NOT summarize, DO NOT skip any parts, and DO NOT shorten the text. Output ONLY the transcription text.";
            
            let userPromptText = `Please transcribe this audio into ${langText}. Provide a full, word-for-word transcript from start to finish.`;
            
            if (mode === 'nofiller') {
                userPromptText = `Please transcribe this audio into ${langText}. Provide a full transcript from start to finish. HOWEVER, you MUST REMOVE filler words, stutters, and hesitation marks (e.g., um, ah, er, like, you know, ເອີ, ອ່າ, ແບບ, ກະຄືວ່າ). Keep the core message and flow intact.`;
            }

            try {
                setLoadingState(true);
                outputArea.value = "";
                
                loadingText.textContent = "ກຳລັງອ່ານໄຟລ໌ ແລະ ແປງເປັນ Base64...";
                const base64Data = await readFileAsBase64(currentFile);

                loadingText.textContent = "ກຳລັງສົ່ງຂໍ້ມູນໄປຍັງ Gemini AI ເພື່ອຖອດສຽງ...";

                // API Endpoint (Using the preview model as instructed)
                const model = "gemini-2.5-flash-preview-09-2025";
                const url = `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${apiKey}`;

                const payload = {
                    contents: [{
                        parts: [
                            { text: userPromptText },
                            { 
                                inlineData: { 
                                    mimeType: currentFile.type || "audio/mp3", 
                                    data: base64Data 
                                } 
                            }
                        ]
                    }],
                    systemInstruction: {
                        parts: [{ text: systemInstructionText }]
                    }
                };

                const responseData = await fetchWithRetry(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                // Extract text from response
                const transcript = responseData.candidates?.[0]?.content?.parts?.[0]?.text;
                
                if (transcript) {
                    outputArea.value = transcript;
                    showToast("Gemini ຖອດສຽງສຳເລັດແລ້ວ!", "success");
                } else {
                    throw new Error("ບໍ່ມີຂໍ້ມູນການຖອດສຽງຕອບກັບຈາກ AI.");
                }

            } catch (error) {
                console.error("Transcription Error:", error);
                let errorMsg = "ເກີດຂໍ້ຜິດພາດໃນການຖອດສຽງ: " + error.message;
                
                // Friendly error for payload too large (common with very large base64)
                if (error.message.includes("400") || error.message.toLowerCase().includes("payload")) {
                    errorMsg = "ໄຟລ໌ໃຫຍ່ເກີນໄປສຳລັບການປະມວນຜົນຜ່ານ Browser ຊົ່ວຄາວ. ໃນລະບົບຈິງຈະຕ້ອງໃຊ້ Cloud Storage.";
                }
                
                showToast(errorMsg, "error");
                outputArea.value = "ເກີດຂໍ້ຜິດພາດ:\n" + errorMsg;
            } finally {
                setLoadingState(false);
            }
        }

        // -- Export to Word --
        function exportToWord() {
            const text = outputArea.value.trim();
            if (!text) {
                showToast("ບໍ່ມີຂໍ້ຄວາມໃຫ້ບັນທຶກ (No text to export)", "warning");
                return;
            }

            // Create a basic HTML structure that Word can read
            const htmlContent = `
                <html xmlns:o='urn:schemas-microsoft-com:office:office' xmlns:w='urn:schemas-microsoft-com:office:word' xmlns='http://www.w3.org/TR/REC-html40'>
                <head>
                    <meta charset='utf-8'>
                    <title>Audio Transcript</title>
                    <style>
                        body { font-family: 'Noto Sans Lao', Arial, sans-serif; font-size: 12pt; line-height: 1.5; }
                        p { margin-bottom: 10pt; }
                    </style>
                </head>
                <body>
                    <h2>Audio Transcript</h2>
                    <div>${text.replace(/\n/g, '<br>')}</div>
                </body>
                </html>
            `;

            // Create Blob with BOM for UTF-8 compatibility in MS Word
            const blob = new Blob(['\ufeff', htmlContent], { type: 'application/msword' });
            const url = URL.createObjectURL(blob);
            
            // Generate filename based on original audio file
            let downloadName = 'Transcript.doc';
            if (currentFile) {
                downloadName = currentFile.name.split('.')[0] + '_Transcript.doc';
            }

            const link = document.createElement('a');
            link.href = url;
            link.download = downloadName;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            URL.revokeObjectURL(url);
            
            showToast("ບັນທຶກເປັນໄຟລ໌ Word ສຳເລັດ!", "success");
        }

        // -- Utility Functions --
        function setLoadingState(isLoading) {
            isProcessing = isLoading;
            btnGeneral.disabled = isLoading;
            btnNoFiller.disabled = isLoading;
            fileInput.disabled = isLoading;
            
            if (isLoading) {
                loadingOverlay.classList.remove('hidden');
                loadingOverlay.classList.add('flex');
            } else {
                loadingOverlay.classList.add('hidden');
                loadingOverlay.classList.remove('flex');
            }
        }

        function showToast(message, type = 'info') {
            const toastContainer = document.getElementById('toast-container');
            const toast = document.createElement('div');
            
            let bgColor, icon;
            switch(type) {
                case 'success':
                    bgColor = 'bg-green-500';
                    icon = `<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>`;
                    break;
                case 'error':
                    bgColor = 'bg-red-500';
                    icon = `<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>`;
                    break;
                case 'warning':
                    bgColor = 'bg-yellow-500';
                    icon = `<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>`;
                    break;
                default:
                    bgColor = 'bg-blue-500';
                    icon = `<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>`;
            }

            toast.className = `flex items-center gap-3 px-4 py-3 rounded-lg text-white shadow-lg transform transition-all duration-300 translate-x-full ${bgColor}`;
            toast.innerHTML = `
                ${icon}
                <span class="text-sm font-medium">${message}</span>
            `;

            toastContainer.appendChild(toast);
            
            // Animate in
            requestAnimationFrame(() => {
                toast.classList.remove('translate-x-full');
            });

            // Remove after 4 seconds
            setTimeout(() => {
                toast.classList.add('translate-x-full');
                setTimeout(() => toast.remove(), 300);
            }, 4000);
        }

    </script>
</body>
</html>
